name: Docbox

# Allow reuse
on:
  workflow_call:

  # Manual Trigger
  workflow_dispatch:

env:
  MODULE_ID: ${{ github.event.repository.name }}
  VERSION: 1.0.0

jobs:
  docbox:
    name: Document ${{ github.event.repository.name }}
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup BoxLang
        uses: ortus-boxlang/setup-boxlang@1.4.0
        with:
          modules: bx-docbox
          with-commandbox: true

      - name: Read version from box.json
        id: current_version
        run: echo "VERSION=`box package show property=version`" >> $GITHUB_ENV

      - name: Generate Documentation
        run: ./runDocs.sh

      - name: Upload API Docs to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --acl public-read
        env:
          AWS_S3_BUCKET: "apidocs.ortussolutions.com"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_SECRET }}
          SOURCE_DIR: "./docs"
          DEST_DIR: "boxlang-modules/${{ env.MODULE_ID }}/${{ env.VERSION }}"